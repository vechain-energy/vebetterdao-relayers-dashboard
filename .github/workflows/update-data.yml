name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. As of 2026-04-13, the round rollover lands
    # around 09:00 in Germany (CEST). Refresh every 30 minutes for the rest of
    # Monday after that rollover window (07:30-21:30 UTC / 09:30-23:30 CEST),
    # then run one daily refresh at 08:00 UTC on Tuesday through Sunday.
    - cron: "30 7 * * 1"
    - cron: "0,30 8-21 * * 1"
    - cron: "0 8 * * 0,2-6"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"
          cache-dependency-path: yarn.lock

      # setup-node only restores Yarn's global package cache. Caching node_modules
      # lets the scheduled refresh skip relinking and rebuilding native packages.
      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-update-data-node-modules-${{ hashFiles('.nvmrc', 'yarn.lock') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Save node_modules cache
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.node-modules-cache.outputs.cache-primary-key }}

      - name: Run incremental report refresh
        run: yarn report:refresh

      - name: Commit and push if report changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            state/actions.sqlite \
            public/data/report.json \
            public/data/report.[0-9]*.json \
            apps/relayer-dashboard/public/data/report.json
          if git diff --staged --quiet; then
            echo "No incremental report changes"
          else
            git commit -m "chore: update auto-voting report"
            git push
          fi
