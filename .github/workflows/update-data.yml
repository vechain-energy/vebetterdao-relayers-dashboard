name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. As of 2026-04-13, this window maps to
    # roughly 09:00-10:00 in Germany (CEST) on Mondays for the post-round refresh.
    - cron: "0,10,20,30,40,50 7 * * 1"
    - cron: "0 8 * * 1"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run incremental report refresh
        run: yarn report:refresh

      - name: Commit and push if report changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            state/actions.sqlite \
            public/data/report.json \
            public/data/report.[0-9]*.json \
            apps/relayer-dashboard/public/data/report.json
          if git diff --staged --quiet; then
            echo "No incremental report changes"
          else
            git commit -m "chore: update auto-voting report [skip ci]"
            git push
          fi
